name: Gatling Performance Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  gatling-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Compile tests
      run: mvn clean test-compile
      
    - name: Run Gatling tests
      run: mvn gatling:test -Dgatling.runMultipleSimulations=true
      continue-on-error: true
      
    - name: Upload Gatling Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gatling-reports
        path: target/gatling/
        retention-days: 30
        
    - name: Test Summary
      if: always()
      run: |
        echo "## Gatling Test Execution Complete" >> $GITHUB_STEP_SUMMARY
        echo "Los reportes completos están disponibles en los artifacts." >> $GITHUB_STEP_SUMMARY
        if [ -f target/gatling/lastRun.txt ]; then
          echo "### Última ejecución:" >> $GITHUB_STEP_SUMMARY
          cat target/gatling/lastRun.txt >> $GITHUB_STEP_SUMMARY
        fi
